<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="XPL Keyed">
  <!-- No rounded corners. Android masks this to its launcher's preferred shape (circle, squircle, square). Safe zone is the central 80%, so the K is sized to fit within ~410px. -->
  <rect width="512" height="512" fill="#0B1538"/>
  <text x="256" y="352" font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="300" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-6">K</text>
</svg>
