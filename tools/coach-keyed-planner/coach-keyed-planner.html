// ===========================================================================
// Retrospective modal
// ===========================================================================

let retroModalOpen = false;

function maybeShowRetrospectiveModal() {
  if (retroModalOpen) return;
  // Find a pending retrospective that's eligible: lesson exists,
  // status is not 'draft' (only ask "how did it go?" if he actually recorded).
  const lessonId = state.pendingRetrospectives.find((id) => {
    const l = state.lessons[id];
    return l && l.status !== "draft";
  });
  if (!lessonId) {
    // Clean up any drafts that snuck in.
    if (state.pendingRetrospectives.length > 0) {
      state.pendingRetrospectives = state.pendingRetrospectives.filter((id) => {
        const l = state.lessons[id];
        return l && l.status !== "draft";
      });
      scheduleSave();
    }
    return;
  }
  showRetroModal(lessonId);
}

function showRetroModal(lessonId) {
  retroModalOpen = true;
  const lesson = state.lessons[lessonId];
  const div = document.createElement("div");
  div.className = "modal-backdrop";
  div.id = "retro-modal";
  div.innerHTML = `
    <div class="modal">
      <h2>How did "${escapeHtml(lessonTitle(lesson))}" go?</h2>
      <p>Anything to remember for next time? Two sentences max.</p>
      <textarea class="field-textarea small" id="retro-note" maxlength="${RETRO_CHAR_CAP + 50}" placeholder="One thing that worked or one thing to change."></textarea>
      <div class="char-counter" id="retro-counter">0 / ${RETRO_CHAR_CAP}</div>
      <div class="btn-row spread">
        <button class="btn btn-ghost" id="retro-skip">Skip</button>
        <button class="btn btn-primary" id="retro-save">Save note</button>
      </div>
    </div>
  `;
  document.body.appendChild(div);
  const ta = div.querySelector("#retro-note");
  const counter = div.querySelector("#retro-counter");
  ta.focus();
  ta.addEventListener("input", () => {
    const len = ta.value.length;
    counter.textContent = `${len} / ${RETRO_CHAR_CAP}`;
    counter.className = "char-counter" + (len > RETRO_CHAR_CAP ? " over" : "");
  });
  div.querySelector("#retro-skip").addEventListener("click", () => closeRetroModal(lessonId, null));
  div.querySelector("#retro-save").addEventListener("click", () => {
    const note = ta.value.trim().slice(0, RETRO_CHAR_CAP);
    closeRetroModal(lessonId, note || null);
  });
}

function closeRetroModal(lessonId, note) {
  const modal = document.getElementById("retro-modal");
  if (modal) modal.remove();
  retroModalOpen = false;
  // Remove this lesson from pending regardless of whether note was saved.
  state.pendingRetrospectives = state.pendingRetrospectives.filter((id) => id !== lessonId);
  if (note) {
    const lesson = state.lessons[lessonId];
    if (lesson) {
      lesson.retrospectives = lesson.retrospectives || [];
      lesson.retrospectives.push({ date: Date.now(), note });
      lesson.updatedAt = Date.now();
    }
  }
  saveState();
  // Check if there's another pending one.
  if (state.pendingRetrospectives.length > 0) maybeShowRetrospectiveModal();
}

// ===========================================================================
// Event handling (delegated)
// ===========================================================================

function attachHandlers() {
  const app = document.getElementById("app");
  app.oninput = onInput;
  app.onclick = onClick;
}

function onInput(e) {
  const t = e.target;
  const lesson = currentLesson();
  if (!lesson) return;

  let handled = false;

  if (t.dataset.field) {
    setNested(lesson, t.dataset.field, t.value);
    handled = true;
  } else if (t.dataset.identifyName !== undefined) {
    const item = (lesson.identifyList || []).find((it) => it.id === t.dataset.identifyName);
    if (item) { item.name = t.value; handled = true; }
  } else if (t.dataset.identifyDesc !== undefined) {
    const item = (lesson.identifyList || []).find((it) => it.id === t.dataset.identifyDesc);
    if (item) { item.description = t.value; handled = true; }
  } else if (t.dataset.breakdownBullet !== undefined) {
    const idx = parseInt(t.dataset.breakdownBullet, 10);
    if (lesson.beatSheet.breakdown[idx]) {
      lesson.beatSheet.breakdown[idx].bullet = t.value;
      handled = true;
    }
  } else if (t.dataset.breakdownWhy !== undefined) {
    const idx = parseInt(t.dataset.breakdownWhy, 10);
    if (lesson.beatSheet.breakdown[idx]) {
      lesson.beatSheet.breakdown[idx].why = t.value;
      handled = true;
    }
  } else if (t.dataset.termWord !== undefined) {
    const idx = parseInt(t.dataset.termWord, 10);
    if (lesson.terms[idx]) {
      lesson.terms[idx].word = t.value;
      handled = true;
    }
  } else if (t.dataset.termDef !== undefined) {
    const idx = parseInt(t.dataset.termDef, 10);
    if (lesson.terms[idx]) {
      lesson.terms[idx].definition = t.value;
      handled = true;
    }
  } else if (t.dataset.check !== undefined) {
    lesson.reviewChecks = lesson.reviewChecks || {};
    lesson.reviewChecks[t.dataset.check] = t.checked;
    lesson.updatedAt = Date.now();
    scheduleSave();
    // Step 6 has the pacing display + terms table that should refresh,
    // and checkboxes don't have focus to preserve, so re-render is fine.
    debouncedRerender();
    return;
  }

  if (handled) {
    lesson.updatedAt = Date.now();
    scheduleSave();
    // Re-evaluate the primary CTA without a full re-render. Keeps the
    // textarea caret + focus intact across keystrokes.
    updateAdvanceButton();
  }
}

// Targeted DOM update: walks the current step's completion check and
// toggles disabled on the next-step (or capstone-start) button. Called
// from onInput so the CTA stays in sync without triggering a re-render
// that would steal focus mid-typing.
function updateAdvanceButton() {
  const lesson = currentLesson();
  if (!lesson) return;
  const step = state.currentStep;
  let complete = false;
  if (step === 1) complete = step1Complete(lesson);
  else if (step === 2) complete = step2Complete(lesson);
  else if (step === 3) complete = step3Complete(lesson);
  else if (step === 4) complete = step4Complete(lesson);
  else if (step === 5) complete = step5Complete(lesson);
  else if (step === 6) complete = step6Complete(lesson);
  else return;

  const nextBtn = document.querySelector('button[data-action="next-step"]');
  if (nextBtn) nextBtn.disabled = !complete;
  const capBtn = document.querySelector('button[data-action="capstone-start-lesson-1"]');
  if (capBtn) {
    capBtn.disabled = !(Array.isArray(lesson.curriculumOrder) && lesson.curriculumOrder.length >= 2);
  }
}

function debouncedRerender() {
  if (inputDebounceTimer) clearTimeout(inputDebounceTimer);
  inputDebounceTimer = setTimeout(() => render(), 60);
}

function onClick(e) {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;
  if (handleAction(action, t)) {
    e.preventDefault();
    e.stopPropagation();
  }
}

function handleAction(action, el) {
  const lesson = currentLesson();
  switch (action) {
    case "goto-home":
      state.currentView = "home";
      saveState();
      render();
      return true;

    case "goto-curriculum":
      state.currentView = "curriculum";
      saveState();
      render();
      return true;

    case "goto-journal":
      state.currentView = "journal";
      saveState();
      render();
      return true;

    case "start-new":
      if (el.dataset.confirmNew !== undefined) {
        const current = currentLesson();
        if (current && maxAccessibleStep(current) < 7) {
          if (!confirm("You have a lesson in progress. Starting a new one parks the current one. Continue?")) return true;
        }
      }
      startNewLesson();
      return true;

    case "resume-lesson":
      if (lesson) {
        state.currentView = "lesson";
        state.currentStep = Math.min(maxAccessibleStep(lesson), 7);
        saveState();
        render();
      }
      return true;

    case "open-lesson":
      openLesson(el.dataset.lessonId);
      return true;

    case "start-from-queue":
      startFromQueue();
      return true;

    case "next-step":
      if (lesson) {
        const max = maxAccessibleStep(lesson);
        state.currentStep = Math.min(state.currentStep + 1, max, 7);
        // Try to auto-advance past the just-completed step.
        if (state.currentStep > 7) state.currentStep = 7;
        saveState();
        render();
      }
      return true;

    case "prev-step":
      state.currentStep = Math.max(1, state.currentStep - 1);
      saveState();
      render();
      return true;

    case "goto-step":
      const step = parseInt(el.dataset.step, 10);
      if (lesson && step >= 1 && step <= 7) {
        const max = maxAccessibleStep(lesson);
        state.currentStep = Math.min(step, max);
        saveState();
        render();
      }
      return true;

    case "identify-add":
      if (lesson) {
        lesson.identifyList.push({ id: uid(), name: "", description: "" });
        setState({});
      }
      return true;

    case "identify-remove":
      if (lesson) {
        lesson.identifyList = lesson.identifyList.filter((it) => it.id !== el.dataset.id);
        setState({});
      }
      return true;

    case "identify-up":
    case "identify-down":
      if (lesson) {
        const id = el.dataset.id;
        const arr = lesson.identifyList;
        const idx = arr.findIndex((it) => it.id === id);
        const delta = action === "identify-up" ? -1 : 1;
        const ni = idx + delta;
        if (ni >= 0 && ni < arr.length) {
          [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
          setState({});
        }
      }
      return true;

    case "dep-independent":
      if (lesson) {
        lesson.isCapstone = false;
        lesson.dependencyAnswered = true;
        lesson.curriculumOrder = null;
        setState({});
      }
      return true;

    case "dep-dependent":
      if (lesson) {
        lesson.isCapstone = true;
        lesson.dependencyAnswered = true;
        lesson.curriculumOrder = lesson.identifyList
          .filter((it) => it.name && it.name.trim())
          .map((it) => it.id);
        setState({});
      }
      return true;

    case "narrow-choose":
      if (lesson) {
        lesson.narrowChoice = el.dataset.id;
        // Stash unchosen items into futureLessons queue.
        const chosen = lesson.narrowChoice;
        lesson.identifyList.forEach((it) => {
          if (it.id !== chosen && it.name && it.name.trim()) {
            // Avoid duplicates by simple name + fromLesson match.
            const exists = state.futureLessons.some(
              (fl) => fl.name === it.name.trim() && fl.fromLessonId === lesson.id,
            );
            if (!exists) {
              state.futureLessons.push({
                id: uid(),
                name: it.name.trim(),
                description: (it.description || "").trim(),
                fromLessonId: lesson.id,
                addedAt: Date.now(),
              });
            }
          }
        });
        // Set the lesson's title to the chosen item's name.
        const chosenItem = lesson.identifyList.find((it) => it.id === chosen);
        if (chosenItem) lesson.title = chosenItem.name;
        setState({});
      }
      return true;

    case "capstone-up":
    case "capstone-down":
      if (lesson && lesson.curriculumOrder) {
        const id = el.dataset.id;
        const arr = lesson.curriculumOrder;
        const idx = arr.indexOf(id);
        const delta = action === "capstone-up" ? -1 : 1;
        const ni = idx + delta;
        if (ni >= 0 && ni < arr.length) {
          [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
          setState({});
        }
      }
      return true;

    case "capstone-start-lesson-1":
      capstoneSpawnSeries();
      return true;

    case "toggle-section": {
      const key = el.dataset.section;
      state.collapsedSections = state.collapsedSections || {};
      state.collapsedSections[key] = !state.collapsedSections[key];
      setState({});
      return true;
    }

    case "breakdown-add":
      if (lesson) {
        lesson.beatSheet.breakdown.push({ bullet: "", why: "" });
        setState({});
      }
      return true;

    case "breakdown-remove":
      if (lesson) {
        const idx = parseInt(el.dataset.idx, 10);
        lesson.beatSheet.breakdown.splice(idx, 1);
        if (lesson.beatSheet.breakdown.length === 0) {
          lesson.beatSheet.breakdown.push({ bullet: "", why: "" });
        }
        setState({});
      }
      return true;

    case "term-add":
      if (lesson) {
        lesson.terms.push({ word: "", definition: "" });
        setState({});
      }
      return true;

    case "term-remove":
      if (lesson) {
        const idx = parseInt(el.dataset.idx, 10);
        lesson.terms.splice(idx, 1);
        if (lesson.terms.length === 0) lesson.terms.push({ word: "", definition: "" });
        setState({});
      }
      return true;

    case "toggle-assumes-prereq":
      if (lesson) {
        lesson.assumesPrerequisites = !lesson.assumesPrerequisites;
        setState({});
      }
      return true;

    case "print":
      window.print();
      return true;

    case "copy-clipboard":
      copyBeatSheetToClipboard(lesson);
      return true;

    case "mark-recorded":
      if (lesson) {
        if (lesson.status === "recorded") {
          // Allow toggling back.
          lesson.status = "draft";
          lesson.recordedAt = null;
          // Remove from pending retrospectives.
          state.pendingRetrospectives = state.pendingRetrospectives.filter((id) => id !== lesson.id);
        } else {
          lesson.status = "recorded";
          lesson.recordedAt = Date.now();
          // Queue retrospective for next home-screen visit.
          if (!state.pendingRetrospectives.includes(lesson.id)) {
            state.pendingRetrospectives.push(lesson.id);
          }
        }
        setState({});
      }
      return true;

    case "save-finish":
      if (lesson) {
        lesson.completedAt = lesson.completedAt || Date.now();
        lesson.updatedAt = Date.now();
        // Add to curriculum if not present.
        if (!state.curriculum.includes(lesson.id)) state.curriculum.push(lesson.id);
        state.currentView = "home";
        state.currentLessonId = null;
        setState({});
      }
      return true;
  }
  return false;
}

function setNested(obj, path, value) {
  const parts = path.split(".");
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (cur[parts[i]] == null) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

// ===========================================================================
// Lesson lifecycle helpers
// ===========================================================================

function startNewLesson() {
  const id = uid();
  state.lessons[id] = defaultLesson(id);
  state.currentLessonId = id;
  state.currentView = "lesson";
  state.currentStep = 1;
  // Curriculum entry is added on save-finish.
  setState({});
}

function openLesson(lessonId) {
  const l = state.lessons[lessonId];
  if (!l) return;
  state.currentLessonId = lessonId;
  state.currentView = "lesson";
  // Open at the highest accessible step so editing is one click away.
  state.currentStep = Math.min(maxAccessibleStep(l), 7);
  setState({});
}

function startFromQueue() {
  const queued = state.futureLessons.shift();
  if (!queued) return;
  const id = uid();
  const lesson = defaultLesson(id, { title: queued.name });
  // Seed the rough draft with the saved description if any.
  if (queued.description) {
    lesson.roughDraft = `From your "saved for later" queue:\n\n${queued.name}\n\n${queued.description}\n\n(Edit this and add your rough notes.)`;
  }
  state.lessons[id] = lesson;
  state.currentLessonId = id;
  state.currentView = "lesson";
  state.currentStep = 1;
  setState({});
}

function capstoneSpawnSeries() {
  const lesson = currentLesson();
  if (!lesson || !lesson.curriculumOrder) return;

  const seriesId = lesson.id;
  // Guard against double-spawn: if children already exist for this series
  // (user navigated back to Step 4 and clicked Start Lesson 1 again),
  // just jump to the first incomplete child instead of creating duplicates.
  const existingChildren = Object.values(state.lessons)
    .filter((l) => l.seriesId === seriesId && l.id !== lesson.id)
    .sort((a, b) => a.createdAt - b.createdAt);
  if (existingChildren.length > 0) {
    const firstIncomplete = existingChildren.find((l) => l.status === "draft") || existingChildren[0];
    state.currentLessonId = firstIncomplete.id;
    state.currentStep = Math.min(maxAccessibleStep(firstIncomplete), 7);
    setState({});
    return;
  }

  const orderedItemIds = lesson.curriculumOrder;
  const items = orderedItemIds.map((id) => lesson.identifyList.find((it) => it.id === id)).filter(Boolean);
  if (items.length === 0) return;

  // Mark the current lesson as the capstone (final in series).
  lesson.seriesId = seriesId;
  lesson.seriesRole = "capstone";
  lesson.title = "Putting it all together";

  // Create N new placeholder lessons for items 1..N.
  const newLessonIds = [];
  items.forEach((it, idx) => {
    const newId = uid();
    const newLesson = defaultLesson(newId, {
      title: it.name,
      seriesId,
      seriesRole: idx === 0 ? "first" : "middle",
    });
    // Pre-fill watchNotes.mainGoal from the item name.
    newLesson.watchNotes.mainGoal = it.name;
    if (it.description) newLesson.roughDraft = `Lesson topic: ${it.name}\n\n${it.description}\n\n(Add your rough notes for this lesson.)`;
    state.lessons[newId] = newLesson;
    newLessonIds.push(newId);
  });

  // Insert new lessons into curriculum in series order; capstone goes last.
  newLessonIds.forEach((id) => {
    if (!state.curriculum.includes(id)) state.curriculum.push(id);
  });
  if (!state.curriculum.includes(lesson.id)) state.curriculum.push(lesson.id);

  // Jump to Lesson 1.
  state.currentLessonId = newLessonIds[0];
  state.currentStep = 1;
  setState({});
}

function copyBeatSheetToClipboard(lesson) {
  if (!lesson) return;
  const lines = [];
  lines.push(lessonTitle(lesson));
  lines.push("=".repeat(Math.max(20, lessonTitle(lesson).length)));
  lines.push("");
  const terms = (lesson.terms || []).filter((t) => t.word && t.definition);
  if (terms.length > 0) {
    lines.push("GLOSSARY");
    terms.forEach((t) => lines.push(`  ${t.word}. ${t.definition}`));
    lines.push("");
  }
  const bs = lesson.beatSheet;
  const push = (title, body) => {
    if (!body) return;
    lines.push(title.toUpperCase());
    lines.push(body);
    lines.push("");
  };
  push("Hook", bs.hook);
  push("Goal", bs.goal);
  push("Demonstration", bs.demonstration);
  if (bs.breakdown && bs.breakdown.length) {
    lines.push("BREAKDOWN");
    bs.breakdown.forEach((b, i) => {
      if (!b.bullet) return;
      lines.push(`  ${i + 1}. ${b.bullet}`);
      if (b.why) lines.push(`     Why: ${b.why}`);
    });
    lines.push("");
  }
  push("Common Mistake", bs.commonMistake);
  push("Practice Setup", bs.practiceSetup);
  push("Summary", bs.summary);
  push("Outro", bs.outro);
  const text = lines.join("\n");
  navigator.clipboard.writeText(text).then(
    () => flashTopBar("Copied to clipboard"),
    () => alert("Copy failed. Try selecting the text manually."),
  );
}

function flashTopBar(message) {
  const topbar = document.querySelector(".topbar-meta");
  if (!topbar) return;
  const flash = document.createElement("span");
  flash.textContent = message;
  flash.style.color = "var(--lime)";
  flash.style.fontSize = "13px";
  topbar.prepend(flash);
  setTimeout(() => flash.remove(), 2200);
}

// ===========================================================================
// Init
// ===========================================================================

render();
</script>
</body>
</html>
